apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicdpractice
  labels:
    app: cicdpractice
spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicdpractice

  template:
    metadata:
      labels:
        app: cicdpractice

    spec:
      containers:
        - name: cicdpractice
          image: cicdpractice:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
